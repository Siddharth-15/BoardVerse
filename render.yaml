services:
  - type: web
    name: boardverse-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: true
      - key: CLIENT_URL
        sync: true
